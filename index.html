<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片裁剪编辑器 - BMP 导出</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="./assets/css/styles.css">
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>

<body>
    <div class="app">
        <div class="header">
            <div class="title-wrap">
                <h1>图片裁剪编辑器</h1>
                <p>拖拽上传图片，裁剪框固定在中央，通过缩放和移动图片完成构图，最终可精确导出 BMP。</p>
            </div>
        </div>

        <div class="layout">
            <section class="editor-panel">
                <div class="editor-stage" id="editorStage">
                    <div class="drop-zone" id="dropZone">
                        <div class="drop-icon">图片</div>
                        <div class="drop-title">拖入图片开始编辑</div>
                        <div class="drop-desc">
                            支持拖拽上传或点击选择图片。设置目标导出尺寸后，中央裁剪框会按对应比例固定显示，图片可在下方进行缩放、移动和旋转。
                        </div>
                        <button class="primary" type="button" id="pickFileBtn">选择图片</button>
                        <input type="file" id="fileInput" accept="image/*">
                    </div>

                    <div class="crop-workspace" id="cropWorkspace">
                        <div class="cropper-host">
                            <img id="image" alt="待编辑图片">
                        </div>
                        <div class="crop-overlay" id="cropOverlay">
                            <div class="mask" id="maskTop"></div>
                            <div class="mask" id="maskRight"></div>
                            <div class="mask" id="maskBottom"></div>
                            <div class="mask" id="maskLeft"></div>
                            <div class="crop-frame" id="cropFrame">
                                <div class="crop-frame-label" id="cropFrameLabel">未设置裁剪尺寸</div>
                            </div>
                        </div>
                    </div>
                    <div class="floating-preview" id="floatingPreview">
                        <div class="preview-head">
                            <h3>抖动预览</h3>
                        </div>
                        <div class="preview-surface">
                            <canvas id="previewCanvas"></canvas>
                        </div>
                    </div>
                </div>
            </section>

            <aside class="side-panel" id="sidePanel">
                <div class="side-panel-drag-handle" id="sidePanelDragHandle" title="拖动工具栏位置" aria-label="拖动工具栏位置"></div>
                <section class="panel-section action-section">
                    <div class="action-grid">
                        <button class="success full" type="button" id="exportBtn">导出8bitBMP</button>
                        <button class="danger full" type="button" id="newImageBtn">清除重来</button>
                    </div>
                </section>

                <section class="panel-section">
                    <h2>裁剪输出尺寸</h2>
                    <div class="preset-inline">
                        <div class="field preset-select-field">
                            <label for="presetSize">预设尺寸</label>
                            <select id="presetSize"></select>
                        </div>
                        <button class="compact-side-btn icon-only" type="button" id="swapDimensionsBtn" title="横竖互换" aria-label="横竖互换">⇄</button>
                    </div>
                    <div class="custom-size-fields" id="customSizeFields">
                        <div class="field">
                            <label for="widthInput">宽度 (px)</label>
                            <input type="number" id="widthInput" min="1" max="10000" placeholder="152">
                        </div>
                        <div class="field">
                            <label for="heightInput">高度 (px)</label>
                            <input type="number" id="heightInput" min="1" max="10000" placeholder="296">
                        </div>
                    </div>
                </section>

                <section class="panel-section">
                    <div class="panel-section-header">
                        <h2>图片调整</h2>
                        <button class="section-icon-btn" type="button" id="resetBtn" title="重置图片变换" aria-label="重置图片变换">↻</button>
                    </div>
                    <div class="icon-button-row">
                        <button class="icon-action" type="button" id="rotateLeft" title="左旋 90°" aria-label="左旋 90°">
                            <span class="icon">↺</span>
                        </button>
                        <button class="icon-action" type="button" id="rotateRight" title="右旋 90°" aria-label="右旋 90°">
                            <span class="icon">↻</span>
                        </button>
                        <button class="icon-action" type="button" id="flipH" title="水平翻转" aria-label="水平翻转">
                            <span class="icon">⇋</span>
                        </button>
                        <button class="icon-action" type="button" id="flipV" title="垂直翻转" aria-label="垂直翻转">
                            <span class="icon">⇅</span>
                        </button>
                    </div>
                </section>

                <section class="panel-section">
                    <div class="panel-section-header">
                        <h2>色彩调节</h2>
                        <button class="section-icon-btn" type="button" id="resetAdjustmentsBtn" title="重置色彩调节" aria-label="重置色彩调节">↻</button>
                    </div>
                    <div class="adjustment-stack">
                        <label class="slider-field" for="exposureInput">
                            <span class="slider-head">
                                <span>曝光</span>
                                <strong id="exposureValue">0</strong>
                            </span>
                            <input type="range" id="exposureInput" min="-100" max="100" step="1" value="0">
                        </label>
                        <label class="slider-field" for="contrastInput">
                            <span class="slider-head">
                                <span>对比度</span>
                                <strong id="contrastValue">0</strong>
                            </span>
                            <input type="range" id="contrastInput" min="-100" max="100" step="1" value="0">
                        </label>
                        <label class="slider-field" for="saturationInput">
                            <span class="slider-head">
                                <span>饱和度</span>
                                <strong id="saturationValue">0</strong>
                            </span>
                            <input type="range" id="saturationInput" min="-100" max="100" step="1" value="0">
                        </label>
                    </div>
                </section>

                <section class="panel-section">
                    <h2>抖动与色板</h2>
                    <div class="field" style="margin-bottom: 10px;">
                        <label for="backgroundColorInput">画布填充色</label>
                        <div class="compact-color-row">
                            <input class="color-swatch-input" type="color" id="backgroundColorInput" value="#ffffff">
                            <input class="hex-input" type="text" id="backgroundHexInput" value="#FFFFFF" maxlength="7" spellcheck="false">
                            <button class="compact-tool-btn" type="button" id="pickColorBtn" title="吸管取色">◉</button>
                        </div>
                    </div>
                    <div class="field" style="margin-bottom: 10px;">
                        <label for="ditherEnabled">抖动开关</label>
                        <label class="toggle-field">
                            <input type="checkbox" id="ditherEnabled" checked>
                            <span>启用抖动处理</span>
                        </label>
                    </div>
                    <div class="field-grid">
                        <div class="field">
                            <label for="paletteSelect">色板</label>
                            <select id="paletteSelect">
                                <option value="4-color.act">4-color.act</option>
                                <option value="6-color.act">6-color.act</option>
                                <option value="Black-White.act">Black-White.act</option>
                                <option value="Black-White-Red.act">Black-White-Red.act</option>
                                <option value="Black-White-Yellow.act">Black-White-Yellow.act</option>
                                <option value="N-color.act">N-color.act</option>
                            </select>
                        </div>
                    </div>
                </section>
            </aside>
        </div>
    </div>

    <div class="modal-backdrop" id="presetManagerModal" hidden>
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="presetManagerTitle">
            <div class="modal-header">
                <div>
                    <h2 id="presetManagerTitle">预设尺寸管理</h2>
                    <p>可新增、修改或删除尺寸预设。</p>
                </div>
                <div class="modal-header-actions">
                    <button class="modal-add-btn" type="button" id="addPresetBtn">新增尺寸</button>
                    <button class="section-icon-btn" type="button" id="closePresetManagerBtn" title="关闭" aria-label="关闭">×</button>
                </div>
            </div>
            <div class="preset-table">
                <div class="preset-table-head">
                    <span aria-hidden="true"></span>
                    <span>名称</span>
                    <span>宽度</span>
                    <span>高度</span>
                    <span class="preset-actions-head">操作</span>
                </div>
                <div class="preset-table-body" id="presetManagerRows"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script type="module" src="./assets/js/main.js"></script>
</body>

</html>
