<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickShakePic</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>
    <div class="app">
        <div class="header">
            <div class="title-wrap">
                <h1>图片裁剪编辑器</h1>
                <p>拖拽上传图片，裁剪框固定在中央，通过缩放和移动图片完成构图，最终可精确导出 BMP。</p>
            </div>
        </div>

        <div class="layout">
            <section class="editor-panel">
                <div class="editor-stage" id="editorStage">
                    <div class="drop-zone" id="dropZone">
                        <div class="landing-title">QuickShakePic</div>
                        <div class="landing-desc">
                            流程：导入图片 → 设定裁剪尺寸 → 构图/调色 → 选择色板导出 BMP<br>
                            快捷键：Ctrl+S 导出，Ctrl+N 清除，Ctrl+Z 撤销，Ctrl+Y 重做，Ctrl+B 取色
                        </div>
                        <button class="primary landing-pick-btn" type="button" id="pickFileBtn">导入或粘贴图片</button>
                        <div class="landing-open-source">
                            <span class="gitee-icon" aria-hidden="true"></span>
                            <span>开源地址：</span>
                            <a href="https://gitee.com/chiyoooo/quick-shake-pic" target="_blank"
                                rel="noopener noreferrer">gitee.com/chiyoooo/quick-shake-pic</a>
                            <span class="app-version" id="appVersion" aria-label="当前版本"></span>
                        </div>
                        <input type="file" id="fileInput" accept="image/*">
                    </div>

                    <div class="crop-workspace" id="cropWorkspace">
                        <div class="cropper-host">
                            <img id="image" alt="待编辑图片">
                        </div>
                        <div class="crop-overlay" id="cropOverlay">
                            <div class="mask" id="maskTop"></div>
                            <div class="mask" id="maskRight"></div>
                            <div class="mask" id="maskBottom"></div>
                            <div class="mask" id="maskLeft"></div>
                            <div class="crop-frame" id="cropFrame">
                                <div class="crop-frame-preview" id="cropFramePreview">
                                    <canvas id="previewCanvas"></canvas>
                                </div>
                                <div class="crop-frame-label" id="cropFrameLabel">未设置裁剪尺寸</div>
                            </div>
                        </div>
                    </div>
                    <div class="floating-preview" id="floatingPreview">
                    </div>
                </div>
            </section>

            <aside class="side-panel" id="sidePanel">
                <section class="panel-section">
                    <div class="action-grid">
                        <button class="success full" type="button" id="exportBtn">导出8bitBMP</button>
                        <button class="danger full" type="button" id="newImageBtn">清除</button>
                    </div>
                </section>

                <section class="panel-section">
                    <h2>裁剪尺寸</h2>
                    <div class="preset-inline">
                        <div class="field preset-select-field">
                            <label class="sr-only" for="presetSize">预设尺寸</label>
                            <select id="presetSize"></select>
                        </div>
                    </div>
                    <div class="custom-size-fields" id="customSizeFields">
                        <div class="field">
                            <label for="widthInput">宽度 (px)</label>
                            <input type="number" id="widthInput" min="1" max="10000" placeholder="152">
                        </div>
                        <div class="field">
                            <label for="heightInput">高度 (px)</label>
                            <input type="number" id="heightInput" min="1" max="10000" placeholder="296">
                        </div>
                    </div>
                </section>

                <section class="panel-section">
                    <div class="panel-section-header">
                        <h2>图片调整</h2>
                        <button class="section-icon-btn" type="button" id="resetBtn" title="重置图片变换"
                            aria-label="重置图片变换">↻</button>
                    </div>
                    <div class="icon-button-row">
                        <button class="icon-action" type="button" id="rotateLeft" title="左旋 90°" aria-label="左旋 90°">
                            <span class="icon">↺</span>
                        </button>
                        <button class="icon-action" type="button" id="rotateRight" title="右旋 90°" aria-label="右旋 90°">
                            <span class="icon">↻</span>
                        </button>
                        <button class="icon-action" type="button" id="flipH" title="水平翻转" aria-label="水平翻转">
                            <span class="icon">⇋</span>
                        </button>
                        <button class="icon-action" type="button" id="flipV" title="垂直翻转" aria-label="垂直翻转">
                            <span class="icon">⇅</span>
                        </button>
                        <button class="icon-action" type="button" id="fitToCropBtn" title="适配裁剪框（与双击画布相同）"
                            aria-label="适配裁剪框">
                            <span class="icon">⛶</span>
                        </button>
                    </div>
                    <label class="slider-field zoom-slider-field" for="zoomInput">
                        <span>缩放</span>
                        <input type="range" id="zoomInput" min="25" max="400" step="1" value="100">
                        <strong id="zoomValue">100%</strong>
                    </label>
                </section>

                <section class="panel-section">
                    <h2>抖动与色板</h2>
                    <div class="field" style="margin-bottom: 10px;">
                        <div class="compact-color-row">
                            <input class="color-swatch-input" type="color" id="backgroundColorInput" value="#ffffff"
                                title="画布填充色" aria-label="画布填充色">
                            <select id="paletteSelect" class="compact-select compact-select-palette">
                                <option value="__none__">不使用调色板</option>
                                <option value="4-color.act" selected>4-color.act</option>
                                <option value="6-color.act">6-color.act</option>
                                <option value="Black-White.act">Black-White.act</option>
                                <option value="Black-White-Red.act">Black-White-Red.act</option>
                                <option value="Black-White-Yellow.act">Black-White-Yellow.act</option>
                                <option value="N-color.act">N-color.act</option>
                            </select>
                            <select id="ditherAlgorithmSelect" class="sr-only" aria-label="抖动算法" tabindex="-1">
                                <option value="floyd-steinberg">Floyd Steinberg</option>
                                <option value="false-floyd-steinberg">False Floyd Steinberg</option>
                                <option value="minimized-average-error">Minimized Average Error</option>
                                <option value="stucki">Stucki</option>
                                <option value="atkinson" selected>Atkinson</option>
                                <option value="burkes">Burkes</option>
                                <option value="sierra">Sierra</option>
                                <option value="two-row">Two Row</option>
                                <option value="sierra-lite">Sierra Lite</option>
                            </select>
                            <div class="custom-select algorithm-picker" id="ditherAlgorithmPicker">
                                <button type="button" class="custom-select-trigger" id="ditherAlgorithmTrigger" aria-haspopup="listbox"
                                    aria-expanded="false">Atkinson</button>
                                <div class="custom-select-menu" id="ditherAlgorithmMenu" hidden>
                                    <div class="custom-select-options" id="ditherAlgorithmOptions" role="listbox" aria-label="抖动算法选项">
                                        <button type="button" class="custom-select-option" data-value="floyd-steinberg">Floyd Steinberg</button>
                                        <button type="button" class="custom-select-option" data-value="false-floyd-steinberg">False Floyd Steinberg</button>
                                        <button type="button" class="custom-select-option" data-value="minimized-average-error">Minimized Average Error</button>
                                        <button type="button" class="custom-select-option" data-value="stucki">Stucki</button>
                                        <button type="button" class="custom-select-option" data-value="atkinson">Atkinson</button>
                                        <button type="button" class="custom-select-option" data-value="burkes">Burkes</button>
                                        <button type="button" class="custom-select-option" data-value="sierra">Sierra</button>
                                        <button type="button" class="custom-select-option" data-value="two-row">Two Row</button>
                                        <button type="button" class="custom-select-option" data-value="sierra-lite">Sierra Lite</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <input type="checkbox" id="showOuterMask" checked hidden>
                    <input type="checkbox" id="ditherEnabled" checked hidden>
                </section>

                <section class="panel-section">
                    <div class="panel-section-header">
                        <h2>色彩调节</h2>
                        <button class="section-icon-btn" type="button" id="resetAdjustmentsBtn" title="重置色彩调节"
                            aria-label="重置色彩调节">↻</button>
                    </div>
                    <div class="adjustment-stack">
                        <label class="slider-field" for="exposureInput">
                            <span>曝光</span>
                            <input type="range" id="exposureInput" min="-100" max="100" step="1" value="0">
                            <strong id="exposureValue">0</strong>
                        </label>
                        <label class="slider-field" for="contrastInput">
                            <span>对比度</span>
                            <input type="range" id="contrastInput" min="-100" max="100" step="1" value="0">
                            <strong id="contrastValue">0</strong>
                        </label>
                        <label class="slider-field" for="saturationInput">
                            <span>饱和度</span>
                            <input type="range" id="saturationInput" min="-100" max="100" step="1" value="0">
                            <strong id="saturationValue">0</strong>
                        </label>
                    </div>
                </section>

                <section class="panel-section">
                    <div class="field-grid compact-toggle-grid">
                        <div class="preview-mode-toggle preview-action-row" id="previewModeToggle">
                            <button type="button" id="previewToggleBtn" class="mode-btn">开始预览（Tab）</button>
                            <button type="button" id="swapDimensionsBtn" class="mode-btn">切换横屏（Q）</button>
                        </div>
                    </div>
                </section>

                <section class="panel-section">
                    <div class="field-grid compact-toggle-grid">
                        <div class="preview-mode-toggle scan-mode-toggle" id="scanModeToggle">
                            <button type="button" id="scanModeRasterBtn" class="mode-btn">光栅扫描</button>
                            <button type="button" id="scanModeSerpentineBtn" class="mode-btn is-active">蛇形扫描</button>
                        </div>
                    </div>
                </section>
            </aside>
        </div>
    </div>

    <div class="hover-tooltip" id="ditherAlgorithmTooltip" hidden></div>

    <div class="modal-backdrop" id="presetManagerModal" hidden>
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="presetManagerTitle">
            <div class="modal-header">
                <div>
                    <h2 id="presetManagerTitle">预设尺寸管理</h2>
                    <p>可新增、修改或删除尺寸预设。</p>
                </div>
                <div class="modal-header-actions">
                    <button class="modal-add-btn" type="button" id="addPresetBtn">新增尺寸</button>
                    <button class="section-icon-btn" type="button" id="closePresetManagerBtn" title="关闭"
                        aria-label="关闭">×</button>
                </div>
            </div>
            <div class="preset-table">
                <div class="preset-table-head">
                    <span aria-hidden="true"></span>
                    <span>名称</span>
                    <span>宽度</span>
                    <span>高度</span>
                    <span class="preset-actions-head">操作</span>
                </div>
                <div class="preset-table-body" id="presetManagerRows"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script type="module" src="./assets/js/main.js?v=20260418-3"></script>
</body>

</html>
