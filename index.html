<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片裁剪编辑器 - BMP 导出</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root {
            --page-bg: radial-gradient(circle at top, #12324f 0%, #071726 58%, #030a12 100%);
            --panel-bg: rgba(7, 19, 31, 0.9);
            --panel-border: rgba(131, 186, 255, 0.18);
            --text-main: #eaf4ff;
            --text-muted: #9fb7cb;
            --accent: #73d0ff;
            --accent-strong: #2fb8ff;
            --danger: #ff6f7d;
            --success: #54d6a1;
            --surface: rgba(255, 255, 255, 0.06);
            --editor-bg: linear-gradient(135deg, #0f2136 0%, #162c45 45%, #0f1f31 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            padding: 24px;
            background: var(--page-bg);
            color: var(--text-main);
            font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
        }

        .app {
            max-width: 1280px;
            margin: 0 auto;
            padding: 22px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02)),
                rgba(4, 12, 20, 0.74);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            gap: 24px;
            align-items: end;
            margin-bottom: 20px;
        }

        .title-wrap h1 {
            font-size: 30px;
            line-height: 1.1;
            margin-bottom: 8px;
            letter-spacing: 0.04em;
        }

        .title-wrap p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .workflow {
            padding: 12px 16px;
            border-radius: 16px;
            background: rgba(115, 208, 255, 0.08);
            border: 1px solid rgba(115, 208, 255, 0.18);
            font-size: 13px;
            color: #d5edff;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 340px;
            gap: 20px;
        }

        .editor-panel,
        .side-panel {
            border-radius: 22px;
            border: 1px solid var(--panel-border);
            background: var(--panel-bg);
            overflow: hidden;
        }

        .editor-panel {
            padding: 18px;
        }

        .editor-toolbar {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .editor-toolbar .tips {
            color: var(--text-muted);
            font-size: 13px;
        }

        .button-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .icon-button-row {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }

        button,
        input {
            font: inherit;
        }

        button {
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 10px 14px;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
        }

        button:hover {
            transform: translateY(-1px);
            border-color: rgba(115, 208, 255, 0.35);
            background: rgba(255, 255, 255, 0.12);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        .primary {
            background: linear-gradient(135deg, var(--accent-strong), #1c87ff);
            color: #f8fcff;
        }

        .primary:hover {
            background: linear-gradient(135deg, #45c5ff, #4095ff);
        }

        .success {
            background: linear-gradient(135deg, #36c98a, var(--success));
            color: #042315;
            font-weight: 700;
        }

        .danger {
            background: linear-gradient(135deg, #f15f72, var(--danger));
        }

        .editor-stage {
            position: relative;
            height: 620px;
            border-radius: 20px;
            overflow: hidden;
            background:
                linear-gradient(45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.03) 75%),
                linear-gradient(45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.03) 75%),
                var(--editor-bg);
            background-size: 28px 28px, 28px 28px, cover;
            background-position: 0 0, 14px 14px, center;
        }

        .drop-zone,
        .crop-workspace {
            position: absolute;
            inset: 0;
        }

        .drop-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: 2px dashed rgba(115, 208, 255, 0.35);
            border-radius: 20px;
            color: #d8ebff;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        .drop-zone.drag-over {
            background: rgba(115, 208, 255, 0.08);
            border-color: rgba(115, 208, 255, 0.75);
            transform: scale(1.01);
        }

        .drop-icon {
            font-size: 56px;
        }

        .drop-title {
            font-size: 22px;
            font-weight: 700;
        }

        .drop-desc {
            max-width: 440px;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.7;
        }

        .crop-workspace {
            display: none;
            background: rgba(5, 14, 23, 0.8);
        }

        .crop-workspace.active {
            display: block;
        }

        .cropper-host {
            position: absolute;
            inset: 0;
        }

        #image {
            display: block;
            max-width: 100%;
        }

        .crop-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .mask {
            position: absolute;
            background: rgba(4, 10, 18, 0.62);
            transition: all 0.2s ease;
        }

        .crop-frame {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 255, 255, 0.92);
            box-shadow: 0 0 0 1px rgba(115, 208, 255, 0.55), 0 0 0 9999px rgba(0, 0, 0, 0);
            border-radius: 18px;
            transition: width 0.2s ease, height 0.2s ease;
        }

        .crop-frame::before,
        .crop-frame::after {
            content: "";
            position: absolute;
            inset: 12px;
            border: 1px dashed rgba(255, 255, 255, 0.35);
            border-radius: 12px;
        }

        .crop-frame-label {
            position: absolute;
            left: 50%;
            top: calc(100% + 10px);
            transform: translateX(-50%);
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(7, 19, 31, 0.9);
            border: 1px solid rgba(115, 208, 255, 0.2);
            color: #eef7ff;
            font-size: 12px;
            white-space: nowrap;
            letter-spacing: 0.04em;
        }

        .side-panel {
            padding: 18px;
        }

        .panel-section + .panel-section {
            margin-top: 18px;
        }

        .panel-section h2 {
            font-size: 15px;
            margin-bottom: 12px;
            color: #f0f8ff;
            letter-spacing: 0.04em;
        }

        .field-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .field label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .field input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .field select {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            background: rgba(13, 30, 47, 0.92);
            color: #f4fbff;
            appearance: none;
        }

        .field select option {
            background: #102538;
            color: #f4fbff;
        }

        .action-section {
            position: sticky;
            top: 18px;
            z-index: 2;
            padding: 14px;
            border-radius: 18px;
            background: rgba(8, 21, 33, 0.96);
            border: 1px solid rgba(115, 208, 255, 0.16);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
        }

        .action-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.25fr) minmax(0, 1fr);
            gap: 10px;
        }

        .action-grid .danger {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-main);
        }

        .adjustment-stack {
            display: grid;
            gap: 12px;
        }

        .slider-field {
            display: grid;
            gap: 8px;
        }

        .slider-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        .slider-head strong {
            color: #f2f9ff;
            font-weight: 600;
        }

        .slider-field input[type="range"] {
            width: 100%;
            accent-color: var(--accent-strong);
            cursor: pointer;
        }

        .compact-color-row {
            display: grid;
            grid-template-columns: 42px minmax(0, 1fr) 42px;
            gap: 8px;
            align-items: center;
        }

        .color-swatch-input {
            width: 42px !important;
            height: 42px;
            padding: 0 !important;
            border-radius: 12px !important;
            overflow: hidden;
            cursor: pointer;
            background: none !important;
        }

        .color-swatch-input::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-swatch-input::-webkit-color-swatch {
            border: none;
            border-radius: 10px;
        }

        .hex-input {
            padding: 10px 12px !important;
            font-family: Consolas, "SFMono-Regular", monospace;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .compact-tool-btn {
            width: 42px;
            height: 42px;
            padding: 0;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            line-height: 1;
        }

        .field input:focus,
        .field select:focus {
            outline: none;
            border-color: rgba(115, 208, 255, 0.6);
            box-shadow: 0 0 0 3px rgba(115, 208, 255, 0.12);
        }

        .stack-buttons {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .custom-size-fields {
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .custom-size-fields.active {
            display: grid;
        }

        .icon-action {
            min-height: 74px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.06);
        }

        .icon-action .icon {
            font-size: 22px;
            line-height: 1;
        }

        .icon-action .label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .full {
            width: 100%;
        }

        .toggle-field {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .toggle-field input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent-strong);
        }

        .info-list {
            border-radius: 14px;
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 12px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 9px 0;
            font-size: 13px;
        }

        .info-item + .info-item {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .info-item span:first-child {
            color: var(--text-muted);
        }

        .info-item strong {
            color: #f6fbff;
        }

        .floating-preview {
            position: fixed;
            left: 0;
            top: 0;
            width: auto;
            padding: 8px;
            border-radius: 18px;
            border: 1px solid rgba(115, 208, 255, 0.25);
            background: rgba(4, 12, 20, 0.96);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
            z-index: 8;
            display: none;
            cursor: move;
            user-select: none;
            touch-action: none;
            transform: translate3d(18px, 18px, 0);
            will-change: transform;
            backface-visibility: hidden;
            contain: layout paint style;
            isolation: isolate;
        }

        .floating-preview.visible {
            display: block;
        }

        .floating-preview.dragging {
            box-shadow: none;
        }

        .preview-head {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 6px;
            pointer-events: none;
        }

        .preview-head h3 {
            font-size: 12px;
            letter-spacing: 0.04em;
        }

        .preview-surface {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 1px dashed rgba(115, 208, 255, 0.18);
            background:
                linear-gradient(45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.03) 75%),
                linear-gradient(45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.03) 75%),
                rgba(10, 23, 36, 0.92);
            background-size: 22px 22px, 22px 22px;
            background-position: 0 0, 11px 11px;
            overflow: hidden;
        }

        #previewCanvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            pointer-events: none;
        }

        #fileInput {
            display: none;
        }

        .cropper-view-box,
        .cropper-face,
        .cropper-line,
        .cropper-point,
        .cropper-dashed {
            display: none !important;
        }

        .cropper-crop-box {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        .cropper-bg,
        .cropper-modal {
            background: transparent !important;
        }

        @media (max-width: 980px) {
            body {
                padding: 14px;
            }

            .layout {
                grid-template-columns: 1fr;
            }

            .side-panel {
                order: -1;
            }

            .action-section {
                position: static;
            }
        }

        @media (max-width: 640px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .editor-stage {
                height: 520px;
            }

            .field-grid,
            .stack-buttons,
            .custom-size-fields,
            .icon-button-row,
            .action-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>

<body>
    <div class="app">
        <div class="header">
            <div class="title-wrap">
                <h1>图片裁剪编辑器</h1>
                <p>拖拽上传图片，裁剪框固定在中央，通过缩放和移动图片完成构图，最终可精确导出 BMP。</p>
            </div>
            <div class="workflow">
                流程：拖入图片 -> 设置导出尺寸 -> 调整图片位置与缩放 -> 导出 BMP
            </div>
        </div>

        <div class="layout">
            <section class="editor-panel">
                <div class="editor-toolbar">
                    <div class="tips">提示：鼠标滚轮缩放，拖拽图片移动，方向键微调，旋转以 90° 为单位。</div>
                    <div class="button-row">
                        <button id="zoomInBtn">放大</button>
                        <button id="zoomOutBtn">缩小</button>
                        <button id="replaceBtn">重新选择图片</button>
                    </div>
                </div>

                <div class="editor-stage" id="editorStage">
                    <div class="drop-zone" id="dropZone">
                        <div class="drop-icon">图片</div>
                        <div class="drop-title">拖入图片开始编辑</div>
                        <div class="drop-desc">
                            支持拖拽上传或点击选择图片。设置目标导出尺寸后，中央裁剪框会按对应比例固定显示，图片可在下方进行缩放、移动和旋转。
                        </div>
                        <button class="primary" type="button" id="pickFileBtn">选择图片</button>
                        <input type="file" id="fileInput" accept="image/*">
                    </div>

                    <div class="crop-workspace" id="cropWorkspace">
                        <div class="cropper-host">
                            <img id="image" alt="待编辑图片">
                        </div>
                        <div class="crop-overlay" id="cropOverlay">
                            <div class="mask" id="maskTop"></div>
                            <div class="mask" id="maskRight"></div>
                            <div class="mask" id="maskBottom"></div>
                            <div class="mask" id="maskLeft"></div>
                            <div class="crop-frame" id="cropFrame">
                                <div class="crop-frame-label" id="cropFrameLabel">未设置裁剪尺寸</div>
                            </div>
                        </div>
                    </div>
                    <div class="floating-preview" id="floatingPreview">
                        <div class="preview-head">
                            <h3>抖动预览</h3>
                        </div>
                        <div class="preview-surface">
                            <canvas id="previewCanvas"></canvas>
                        </div>
                    </div>
                </div>
            </section>

            <aside class="side-panel">
                <section class="panel-section action-section">
                    <div class="action-grid">
                        <button class="success full" type="button" id="exportBtn">导出8bitBMP</button>
                        <button class="danger full" type="button" id="newImageBtn">清除重来</button>
                    </div>
                </section>

                <section class="panel-section">
                    <h2>裁剪输出尺寸</h2>
                    <div class="field" style="margin-bottom: 10px;">
                        <label for="presetSize">预设尺寸</label>
                        <select id="presetSize">
                            <option value="200x200">1.54" (200 × 200)</option>
                            <option value="122x250">2.13" (122 × 250)</option>
                            <option value="152x296">2.66" (152 × 296)</option>
                            <option value="296x128">2.9" (296 × 128)</option>
                            <option value="184x384">3.5" (184 × 384)</option>
                            <option value="800x480">3.97" (800 × 480)</option>
                            <option value="400x300">4.2" (400 × 300)</option>
                            <option value="648x480">5.8" (648 × 480)</option>
                            <option value="800x480">7.5" (800 × 480)</option>
                            <option value="960x672">9.7" (960 × 672)</option>
                            <option value="custom">自定义尺寸</option>
                        </select>
                    </div>
                    <div class="custom-size-fields" id="customSizeFields">
                        <div class="field">
                            <label for="widthInput">宽度 (px)</label>
                            <input type="number" id="widthInput" min="1" max="10000" placeholder="152">
                        </div>
                        <div class="field">
                            <label for="heightInput">高度 (px)</label>
                            <input type="number" id="heightInput" min="1" max="10000" placeholder="296">
                        </div>
                    </div>
                    <button class="full" type="button" id="swapDimensionsBtn" style="margin-top: 10px;">横竖互换</button>
                </section>

                <section class="panel-section">
                    <h2>图片调整</h2>
                    <div class="icon-button-row">
                        <button class="icon-action" type="button" id="rotateLeft" title="左旋 90°">
                            <span class="icon">↺</span>
                            <span class="label">左旋</span>
                        </button>
                        <button class="icon-action" type="button" id="rotateRight" title="右旋 90°">
                            <span class="icon">↻</span>
                            <span class="label">右旋</span>
                        </button>
                        <button class="icon-action" type="button" id="flipH" title="水平翻转">
                            <span class="icon">⇋</span>
                            <span class="label">水平翻转</span>
                        </button>
                        <button class="icon-action" type="button" id="flipV" title="垂直翻转">
                            <span class="icon">⇅</span>
                            <span class="label">垂直翻转</span>
                        </button>
                    </div>
                    <button class="full" type="button" id="resetBtn" style="margin-top: 10px;">重置图片变换</button>
                </section>

                <section class="panel-section">
                    <h2>色彩调节</h2>
                    <div class="adjustment-stack">
                        <label class="slider-field" for="exposureInput">
                            <span class="slider-head">
                                <span>曝光</span>
                                <strong id="exposureValue">0</strong>
                            </span>
                            <input type="range" id="exposureInput" min="-100" max="100" step="1" value="0">
                        </label>
                        <label class="slider-field" for="contrastInput">
                            <span class="slider-head">
                                <span>对比度</span>
                                <strong id="contrastValue">0</strong>
                            </span>
                            <input type="range" id="contrastInput" min="-100" max="100" step="1" value="0">
                        </label>
                        <label class="slider-field" for="hueInput">
                            <span class="slider-head">
                                <span>色相</span>
                                <strong id="hueValue">0°</strong>
                            </span>
                            <input type="range" id="hueInput" min="-180" max="180" step="1" value="0">
                        </label>
                        <label class="slider-field" for="saturationInput">
                            <span class="slider-head">
                                <span>饱和度</span>
                                <strong id="saturationValue">0</strong>
                            </span>
                            <input type="range" id="saturationInput" min="-100" max="100" step="1" value="0">
                        </label>
                        <button class="full" type="button" id="resetAdjustmentsBtn">重置色彩调节</button>
                    </div>
                </section>

                <section class="panel-section">
                    <h2>抖动与色板</h2>
                    <div class="field" style="margin-bottom: 10px;">
                        <label for="backgroundColorInput">画布填充色</label>
                        <div class="compact-color-row">
                            <input class="color-swatch-input" type="color" id="backgroundColorInput" value="#ffffff">
                            <input class="hex-input" type="text" id="backgroundHexInput" value="#FFFFFF" maxlength="7" spellcheck="false">
                            <button class="compact-tool-btn" type="button" id="pickColorBtn" title="吸管取色">◉</button>
                        </div>
                    </div>

                                <option value="4-color.act">4-color.act</option>
                                <option value="6-color.act">6-color.act</option>
                                <option value="Black-White.act">Black-White.act</option>
                                <option value="Black-White-Red.act">Black-White-Red.act</option>
                                <option value="Black-White-Yellow.act">Black-White-Yellow.act</option>
                                <option value="N-color.act">N-color.act</option>
                            </select>
                        </div>
                    </div>
                </section>
            </aside>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const dropZone = document.getElementById('dropZone');
        const pickFileBtn = document.getElementById('pickFileBtn');
        const replaceBtn = document.getElementById('replaceBtn');
        const fileInput = document.getElementById('fileInput');
        const cropWorkspace = document.getElementById('cropWorkspace');
        const editorStage = document.getElementById('editorStage');
        const image = document.getElementById('image');

        const widthInput = document.getElementById('widthInput');
        const heightInput = document.getElementById('heightInput');
        const presetSizeSelect = document.getElementById('presetSize');
        const customSizeFields = document.getElementById('customSizeFields');
        const swapDimensionsBtn = document.getElementById('swapDimensionsBtn');

        const rotateLeftBtn = document.getElementById('rotateLeft');
        const rotateRightBtn = document.getElementById('rotateRight');
        const flipHBtn = document.getElementById('flipH');
        const flipVBtn = document.getElementById('flipV');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const resetBtn = document.getElementById('resetBtn');
        const exportBtn = document.getElementById('exportBtn');
        const newImageBtn = document.getElementById('newImageBtn');
        const backgroundColorInput = document.getElementById('backgroundColorInput');
        const backgroundHexInput = document.getElementById('backgroundHexInput');
        const pickColorBtn = document.getElementById('pickColorBtn');
        const exposureInput = document.getElementById('exposureInput');
        const contrastInput = document.getElementById('contrastInput');
        const hueInput = document.getElementById('hueInput');
        const saturationInput = document.getElementById('saturationInput');
        const exposureValue = document.getElementById('exposureValue');
        const contrastValue = document.getElementById('contrastValue');
        const hueValue = document.getElementById('hueValue');
        const saturationValue = document.getElementById('saturationValue');
                        const resetAdjustmentsBtn = document.getElementById('resetAdjustmentsBtn');
        const ditherEnabledInput = document.getElementById('ditherEnabled');
        const paletteSelect = document.getElementById('paletteSelect');
        const floatingPreview = document.getElementById('floatingPreview');
        const previewCanvas = document.getElementById('previewCanvas');

        const cropFrame = document.getElementById('cropFrame');
        const cropFrameLabel = document.getElementById('cropFrameLabel');
        const maskTop = document.getElementById('maskTop');
        const maskRight = document.getElementById('maskRight');
        const maskBottom = document.getElementById('maskBottom');
        const maskLeft = document.getElementById('maskLeft');

        let cropper = null;
        let originalImageURL = '';
        let currentRotation = 0;
        let scaleX = 1;
        let scaleY = 1;
        let targetWidth = 0;
        let targetHeight = 0;
        let resizeTimer = null;
        let previewRenderTimer = null;
        let previewDragState = null;
        let previewPosition = { left: 18, top: 18 };
        let snapState = {
            horizontal: null,
            vertical: null
        };
        let isApplyingWeakSnap = false;
        let adjustmentState = {
            exposure: 0,
            contrast: 0,
            hue: 0,
            saturation: 0
        };

        const WEAK_SNAP_THRESHOLD = 10;
        const WEAK_SNAP_RELEASE_THRESHOLD = 22;

        if (floatingPreview.parentElement !== document.body) {
            document.body.appendChild(floatingPreview);
        }

        const PALETTE_PRESETS = {
            '4-color.act': [
                [0, 0, 0],
                [255, 255, 255],
                [255, 255, 0],
                [255, 0, 0]
            ],
            '6-color.act': [
                [0, 0, 0],
                [255, 255, 255],
                [255, 255, 0],
                [255, 0, 0],
                [0, 0, 255],
                [0, 255, 0]
            ],
            'Black-White.act': [
                [0, 0, 0],
                [255, 255, 255]
            ],
            'Black-White-Red.act': [
                [0, 0, 0],
                [255, 0, 0],
                [255, 255, 255]
            ],
            'Black-White-Yellow.act': [
                [0, 0, 0],
                [255, 255, 0],
                [255, 255, 255]
            ],
            'N-color.act': [
                [0, 0, 0],
                [0, 0, 255],
                [255, 0, 0],
                [0, 255, 0],
                [255, 128, 0],
                [255, 255, 0],
                [255, 255, 255]
            ]
        };

        function getTargetAspectRatio() {
            return targetWidth > 0 && targetHeight > 0 ? targetWidth / targetHeight : 1;
        }

        function setWorkspaceState(hasImage) {
            dropZone.style.display = hasImage ? 'none' : 'flex';
            cropWorkspace.classList.toggle('active', hasImage);
        }

        function clamp(value, min, max) {
            return Math.min(Math.max(value, min), max);
        }

        function formatSignedValue(value, suffix = '') {
            const numeric = Number(value) || 0;
            return `${numeric > 0 ? '+' : ''}${numeric}${suffix}`;
        }

        function updateAdjustmentPreview() {
            const brightness = Math.pow(2, adjustmentState.exposure / 100).toFixed(3);
            const contrast = Math.max(0, 1 + adjustmentState.contrast / 100).toFixed(3);
            const saturation = Math.max(0, 1 + adjustmentState.saturation / 100).toFixed(3);
            const filters = [];

            if (adjustmentState.exposure !== 0) {
                filters.push(`brightness(${brightness})`);
            }

            if (adjustmentState.contrast !== 0) {
                filters.push(`contrast(${contrast})`);
            }

            if (adjustmentState.hue !== 0) {
                filters.push(`hue-rotate(${adjustmentState.hue}deg)`);
            }

            if (adjustmentState.saturation !== 0) {
                filters.push(`saturate(${saturation})`);
            }

            const filterValue = filters.length ? filters.join(' ') : 'none';
            image.style.filter = filterValue;
            editorStage.querySelectorAll('.cropper-container img').forEach((img) => {
                img.style.filter = filterValue;
            });
        }

        function updateAdjustmentValueLabels() {
            exposureValue.textContent = formatSignedValue(adjustmentState.exposure);
            contrastValue.textContent = formatSignedValue(adjustmentState.contrast);
            hueValue.textContent = formatSignedValue(adjustmentState.hue, '°');
            saturationValue.textContent = formatSignedValue(adjustmentState.saturation);
        }

        function syncAdjustmentInputs() {
            exposureInput.value = String(adjustmentState.exposure);
            contrastInput.value = String(adjustmentState.contrast);
            hueInput.value = String(adjustmentState.hue);
            saturationInput.value = String(adjustmentState.saturation);
            updateAdjustmentValueLabels();
            updateAdjustmentPreview();
        }

        function resetAdjustments() {
            adjustmentState = {
                exposure: 0,
                contrast: 0,
                hue: 0,
                saturation: 0
            };
            syncAdjustmentInputs();
            schedulePreviewRender();
        }

        function rgbToHsl(red, green, blue) {
            const r = red / 255;
            const g = green / 255;
            const b = blue / 255;
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            const lightness = (max + min) / 2;
            const delta = max - min;
            let hue = 0;
            let saturation = 0;

            if (delta !== 0) {
                saturation = delta / (1 - Math.abs(2 * lightness - 1));

                switch (max) {
                    case r:
                        hue = ((g - b) / delta) % 6;
                        break;
                    case g:
                        hue = (b - r) / delta + 2;
                        break;
                    default:
                        hue = (r - g) / delta + 4;
                        break;
                }

                hue *= 60;
                if (hue < 0) {
                    hue += 360;
                }
            }

            return { hue, saturation, lightness };
        }

        function hueToRgb(p, q, t) {
            let value = t;
            if (value < 0) value += 1;
            if (value > 1) value -= 1;
            if (value < 1 / 6) return p + (q - p) * 6 * value;
            if (value < 1 / 2) return q;
            if (value < 2 / 3) return p + (q - p) * (2 / 3 - value) * 6;
            return p;
        }

        function hslToRgb(hue, saturation, lightness) {
            const h = hue / 360;

            if (saturation === 0) {
                const grayscale = Math.round(lightness * 255);
                return [grayscale, grayscale, grayscale];
            }

            const q = lightness < 0.5 ? lightness * (1 + saturation) : lightness + saturation - lightness * saturation;
            const p = 2 * lightness - q;

            return [
                Math.round(hueToRgb(p, q, h + 1 / 3) * 255),
                Math.round(hueToRgb(p, q, h) * 255),
                Math.round(hueToRgb(p, q, h - 1 / 3) * 255)
            ];
        }

        function applyImageAdjustmentsToCanvas(sourceCanvas) {
            const outputCanvas = document.createElement('canvas');
            outputCanvas.width = sourceCanvas.width;
            outputCanvas.height = sourceCanvas.height;

            const outputContext = outputCanvas.getContext('2d');
            outputContext.drawImage(sourceCanvas, 0, 0);

            const imageData = outputContext.getImageData(0, 0, outputCanvas.width, outputCanvas.height);
            const pixels = imageData.data;
            const exposureFactor = Math.pow(2, adjustmentState.exposure / 100);
            const contrastFactor = Math.max(0, 1 + adjustmentState.contrast / 100);
            const saturationFactor = Math.max(0, 1 + adjustmentState.saturation / 100);
            const hueShift = adjustmentState.hue;
            const shouldAdjustHueSat = hueShift !== 0 || saturationFactor !== 1;

            for (let index = 0; index < pixels.length; index += 4) {
                if (pixels[index + 3] === 0) {
                    continue;
                }

                let red = clamp(pixels[index] * exposureFactor, 0, 255);
                let green = clamp(pixels[index + 1] * exposureFactor, 0, 255);
                let blue = clamp(pixels[index + 2] * exposureFactor, 0, 255);

                red = clamp((red - 127.5) * contrastFactor + 127.5, 0, 255);
                green = clamp((green - 127.5) * contrastFactor + 127.5, 0, 255);
                blue = clamp((blue - 127.5) * contrastFactor + 127.5, 0, 255);

                if (shouldAdjustHueSat) {
                    const hsl = rgbToHsl(red, green, blue);
                    const shiftedHue = (hsl.hue + hueShift + 360) % 360;
                    const adjustedSaturation = clamp(hsl.saturation * saturationFactor, 0, 1);
                    [red, green, blue] = hslToRgb(shiftedHue, adjustedSaturation, hsl.lightness);
                }

                pixels[index] = Math.round(red);
                pixels[index + 1] = Math.round(green);
                pixels[index + 2] = Math.round(blue);
            }

            outputContext.putImageData(imageData, 0, 0);
            return outputCanvas;
        }

        function updateInfo() {
            cropFrameLabel.textContent = targetWidth && targetHeight
                ? `导出 ${targetWidth} × ${targetHeight}`
                : '未设置裁剪尺寸';
        }

        function updateCustomSizeVisibility() {
            customSizeFields.classList.toggle('active', presetSizeSelect.value === 'custom');
        }

        function updateDitherUIState() {
            const shouldShow = Boolean(cropper) && ditherEnabledInput.checked;
            floatingPreview.classList.toggle('visible', shouldShow);
            exportBtn.textContent = ditherEnabledInput.checked ? '导出8bitBMP' : '导出24bitBMP';
        }

        function normalizeHexColor(value) {
            if (!value) {
                return null;
            }

            let normalized = value.trim().replace(/^#/, '');
            if (normalized.length === 3) {
                normalized = normalized.split('').map((char) => char + char).join('');
            }

            if (!/^[0-9a-fA-F]{6}$/.test(normalized)) {
                return null;
            }

            return `#${normalized.toUpperCase()}`;
        }

        function setBackgroundColor(color) {
            const normalized = normalizeHexColor(color);
            if (!normalized) {
                return false;
            }

            backgroundColorInput.value = normalized;
            backgroundHexInput.value = normalized;
            schedulePreviewRender();
            return true;
        }

        function clampFloatingPreviewPosition(left, top) {
            const previewRect = floatingPreview.getBoundingClientRect();
            const maxLeft = Math.max(window.innerWidth - previewRect.width - 12, 12);
            const maxTop = Math.max(window.innerHeight - previewRect.height - 12, 12);

            return {
                left: Math.min(Math.max(left, 12), maxLeft),
                top: Math.min(Math.max(top, 12), maxTop)
            };
        }

        function setFloatingPreviewPosition(left, top) {
            const clamped = clampFloatingPreviewPosition(left, top);
            previewPosition = clamped;
            floatingPreview.style.transform = `translate3d(${clamped.left}px, ${clamped.top}px, 0)`;
        }

        function updateOverlayMask(frameWidth, frameHeight) {
            const stageRect = editorStage.getBoundingClientRect();
            const left = (stageRect.width - frameWidth) / 2;
            const top = (stageRect.height - frameHeight) / 2;
            const right = left + frameWidth;
            const bottom = top + frameHeight;

            maskTop.style.left = '0px';
            maskTop.style.top = '0px';
            maskTop.style.width = '100%';
            maskTop.style.height = `${Math.max(top, 0)}px`;

            maskBottom.style.left = '0px';
            maskBottom.style.top = `${Math.max(bottom, 0)}px`;
            maskBottom.style.width = '100%';
            maskBottom.style.height = `${Math.max(stageRect.height - bottom, 0)}px`;

            maskLeft.style.left = '0px';
            maskLeft.style.top = `${Math.max(top, 0)}px`;
            maskLeft.style.width = `${Math.max(left, 0)}px`;
            maskLeft.style.height = `${Math.max(frameHeight, 0)}px`;

            maskRight.style.left = `${Math.max(right, 0)}px`;
            maskRight.style.top = `${Math.max(top, 0)}px`;
            maskRight.style.width = `${Math.max(stageRect.width - right, 0)}px`;
            maskRight.style.height = `${Math.max(frameHeight, 0)}px`;
        }

        function getFixedCropBoxSize() {
            const stageRect = editorStage.getBoundingClientRect();
            const maxWidth = Math.max(stageRect.width - 80, 120);
            const maxHeight = Math.max(stageRect.height - 110, 120);
            const aspectRatio = getTargetAspectRatio();

            let width = maxWidth;
            let height = width / aspectRatio;

            if (height > maxHeight) {
                height = maxHeight;
                width = height * aspectRatio;
            }

            return {
                width: Math.max(80, Math.round(width)),
                height: Math.max(80, Math.round(height))
            };
        }

        function applyFixedCropBox() {
            if (!cropper) {
                updateOverlayMask(0, 0);
                return;
            }

            const containerData = cropper.getContainerData();
            if (!containerData.width || !containerData.height) {
                return;
            }

            const { width, height } = getFixedCropBoxSize();
            cropper.setCropBoxData({
                left: (containerData.width - width) / 2,
                top: (containerData.height - height) / 2,
                width,
                height
            });

            cropFrame.style.width = `${width}px`;
            cropFrame.style.height = `${height}px`;
            updateOverlayMask(width, height);
        }

        function getSnapCandidate(distanceMap) {
            let bestCandidate = null;

            Object.entries(distanceMap).forEach(([edge, distance]) => {
                const absoluteDistance = Math.abs(distance);
                if (absoluteDistance > WEAK_SNAP_THRESHOLD) {
                    return;
                }

                if (!bestCandidate || absoluteDistance < Math.abs(bestCandidate.distance)) {
                    bestCandidate = { edge, distance };
                }
            });

            return bestCandidate;
        }

        function resolveSnapEdge(axis, distances) {
            const lockedEdge = snapState[axis];

            if (lockedEdge) {
                const lockedDistance = distances[lockedEdge];
                if (Math.abs(lockedDistance) <= WEAK_SNAP_RELEASE_THRESHOLD) {
                    return {
                        edge: lockedEdge,
                        distance: lockedDistance
                    };
                }

                snapState[axis] = null;
            }

            const candidate = getSnapCandidate(distances);
            if (!candidate) {
                return null;
            }

            snapState[axis] = candidate.edge;
            return candidate;
        }

        function applyWeakSnap() {
            if (!cropper || isApplyingWeakSnap) {
                return;
            }

            const canvasData = cropper.getCanvasData();
            const cropBoxData = cropper.getCropBoxData();

            if (!canvasData || !cropBoxData) {
                return;
            }

            const horizontalSnap = resolveSnapEdge('horizontal', {
                left: canvasData.left - cropBoxData.left,
                right: (canvasData.left + canvasData.width) - (cropBoxData.left + cropBoxData.width)
            });
            const verticalSnap = resolveSnapEdge('vertical', {
                top: canvasData.top - cropBoxData.top,
                bottom: (canvasData.top + canvasData.height) - (cropBoxData.top + cropBoxData.height)
            });

            if (!horizontalSnap && !verticalSnap) {
                return;
            }

            const nextCanvasData = {
                left: canvasData.left,
                top: canvasData.top
            };

            if (horizontalSnap) {
                nextCanvasData.left -= horizontalSnap.distance;
            }

            if (verticalSnap) {
                nextCanvasData.top -= verticalSnap.distance;
            }

            isApplyingWeakSnap = true;
            cropper.setCanvasData(nextCanvasData);
            isApplyingWeakSnap = false;
        }

        function initializeCropper() {
            cropper = new Cropper(image, {
                viewMode: 0,
                dragMode: 'move',
                autoCrop: true,
                autoCropArea: 1,
                background: false,
                responsive: true,
                restore: false,
                guides: false,
                center: false,
                highlight: false,
                movable: true,
                zoomable: true,
                rotatable: true,
                scalable: true,
                cropBoxMovable: false,
                cropBoxResizable: false,
                toggleDragModeOnDblclick: false,
                wheelZoomRatio: 0.1,
                ready() {
                    cropper.setDragMode('move');
                    snapState.horizontal = null;
                    snapState.vertical = null;
                    applyFixedCropBox();
                    updateInfo();
                    updateDitherUIState();
                    schedulePreviewRender();
                },
                cropmove() {
                    applyWeakSnap();
                    applyFixedCropBox();
                    schedulePreviewRender();
                },
                zoom() {
                    requestAnimationFrame(() => {
                        applyFixedCropBox();
                        schedulePreviewRender();
                    });
                }
            });
        }

        function loadImage(file) {
            if (!file || !file.type.startsWith('image/')) {
                alert('请选择有效的图片文件。');
                return;
            }

            if (cropper) {
                cropper.destroy();
                cropper = null;
            }

            if (originalImageURL) {
                URL.revokeObjectURL(originalImageURL);
            }

            originalImageURL = URL.createObjectURL(file);
            image.src = originalImageURL;
            currentRotation = 0;
            scaleX = 1;
            scaleY = 1;
            snapState.horizontal = null;
            snapState.vertical = null;
            targetWidth = Number.parseInt(widthInput.value, 10) || targetWidth || 0;
            targetHeight = Number.parseInt(heightInput.value, 10) || targetHeight || 0;
            cropFrame.style.width = '0px';
            cropFrame.style.height = '0px';
            image.onload = () => {
                setWorkspaceState(true);
                initializeCropper();
                if (targetWidth && targetHeight) {
                    cropper.setAspectRatio(targetWidth / targetHeight);
                }
                updateInfo();
                updateDitherUIState();
                schedulePreviewRender();
            };
        }

        function getClipboardImageFile(event) {
            const items = event.clipboardData?.items || [];

            for (const item of items) {
                if (item.type && item.type.startsWith('image/')) {
                    const file = item.getAsFile();
                    if (file) {
                        return file;
                    }
                }
            }

            return null;
        }

        function setInputsFromDimensions(width, height) {
            widthInput.value = width || '';
            heightInput.value = height || '';
        }

        function syncPresetSelection() {
            const width = Number.parseInt(widthInput.value, 10);
            const height = Number.parseInt(heightInput.value, 10);

            if (!width || !height) {
                presetSizeSelect.value = 'custom';
                updateCustomSizeVisibility();
                return;
            }

            const exactValue = `${width}x${height}`;
            const swappedValue = `${height}x${width}`;
            const hasExact = Array.from(presetSizeSelect.options).some((option) => option.value === exactValue);
            const hasSwapped = Array.from(presetSizeSelect.options).some((option) => option.value === swappedValue);

            if (hasExact) {
                presetSizeSelect.value = exactValue;
            } else if (hasSwapped) {
                presetSizeSelect.value = swappedValue;
            } else {
                presetSizeSelect.value = 'custom';
            }

            updateCustomSizeVisibility();
        }

        function tryAutoApplyResolution() {
            const width = Number.parseInt(widthInput.value, 10);
            const height = Number.parseInt(heightInput.value, 10);

            if (!width || !height || width <= 0 || height <= 0) {
                return;
            }

            if (cropper) {
                applyResolution();
            } else {
                targetWidth = width;
                targetHeight = height;
                updateInfo();
            }
        }

        function applyResolution() {
            if (!cropper) {
                return;
            }

            const width = Number.parseInt(widthInput.value, 10);
            const height = Number.parseInt(heightInput.value, 10);

            if (!width || !height || width <= 0 || height <= 0) {
                return;
            }

            targetWidth = width;
            targetHeight = height;
            cropper.setAspectRatio(targetWidth / targetHeight);
            applyFixedCropBox();
            syncPresetSelection();
            updateInfo();
            schedulePreviewRender();
        }

        function getProcessedCanvas() {
            if (!cropper || !targetWidth || !targetHeight) {
                return null;
            }

            applyFixedCropBox();

            const canvas = cropper.getCroppedCanvas({
                width: targetWidth,
                height: targetHeight,
                imageSmoothingEnabled: true,
                imageSmoothingQuality: 'high'
            });

            if (!canvas) {
                return null;
            }

            const adjustedCanvas = applyImageAdjustmentsToCanvas(canvas);
            return fillCanvasBackground(adjustedCanvas, backgroundColorInput.value);
        }

        function fillCanvasBackground(sourceCanvas, color) {
            const outputCanvas = document.createElement('canvas');
            outputCanvas.width = sourceCanvas.width;
            outputCanvas.height = sourceCanvas.height;

            const outputContext = outputCanvas.getContext('2d');
            outputContext.fillStyle = color || '#ffffff';
            outputContext.fillRect(0, 0, outputCanvas.width, outputCanvas.height);
            outputContext.drawImage(sourceCanvas, 0, 0);

            return outputCanvas;
        }

        async function pickBackgroundColor() {
            if (!window.EyeDropper) {
                alert('当前浏览器不支持吸管取色。');
                return;
            }

            try {
                const eyeDropper = new EyeDropper();
                const result = await eyeDropper.open();
                setBackgroundColor(result.sRGBHex);
            } catch (error) {
                if (error?.name !== 'AbortError') {
                    alert('取色失败，请重试。');
                }
            }
        }

        function exportBMP() {
            if (!cropper) {
                alert('请先加载图片。');
                return;
            }

            if (!targetWidth || !targetHeight) {
                alert('请先设置裁剪尺寸。');
                return;
            }

            const canvas = getProcessedCanvas();

            if (!canvas) {
                alert('当前图片无法导出，请调整图片位置或缩放后重试。');
                return;
            }

            let bmpBuffer;
            let fileSuffix;

            if (ditherEnabledInput.checked) {
                const processed = quantizeCanvasToIndexed(canvas, paletteSelect.value);
                bmpBuffer = indexedToBMP(processed.width, processed.height, processed.indices, processed.palette);
                fileSuffix = `${paletteSelect.value.replace('.act', '')}_floyd-steinberg_indexed8`;
            } else {
                bmpBuffer = canvasToBMP(canvas);
                fileSuffix = 'rgb24';
            }

            const blob = new Blob([bmpBuffer], { type: 'image/bmp' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `crop_${targetWidth}x${targetHeight}_${fileSuffix}_${Date.now()}.bmp`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function resetEditor() {
            if (!cropper) {
                return;
            }

            cropper.reset();
            currentRotation = 0;
            scaleX = 1;
            scaleY = 1;
            snapState.horizontal = null;
            snapState.vertical = null;
            if (targetWidth && targetHeight) {
                cropper.setAspectRatio(targetWidth / targetHeight);
            }
            applyFixedCropBox();
            updateInfo();
            schedulePreviewRender();
        }

        function clearAll() {
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }

            if (originalImageURL) {
                URL.revokeObjectURL(originalImageURL);
                originalImageURL = '';
            }

            image.src = '';
            image.style.filter = 'none';
            fileInput.value = '';
            currentRotation = 0;
            scaleX = 1;
            scaleY = 1;
            snapState.horizontal = null;
            snapState.vertical = null;
            targetWidth = 0;
            targetHeight = 0;
            resetAdjustments();
            widthInput.value = '';
            heightInput.value = '';
            presetSizeSelect.value = '200x200';
            updateCustomSizeVisibility();
            cropFrame.style.width = '0px';
            cropFrame.style.height = '0px';
            updateOverlayMask(0, 0);
            setWorkspaceState(false);
            updateInfo();
            updateDitherUIState();
        }

        function canvasToBMP(canvas) {
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const pixels = ctx.getImageData(0, 0, width, height).data;
            const bytesPerPixel = 3;
            const rowSize = width * bytesPerPixel;
            const paddedRowSize = (rowSize + 3) & ~3;
            const paddingSize = paddedRowSize - rowSize;
            const pixelArraySize = paddedRowSize * height;
            const pixelDataOffset = 54;
            const fileSize = pixelDataOffset + pixelArraySize;
            const buffer = new ArrayBuffer(fileSize);
            const view = new DataView(buffer);
            const bytes = new Uint8Array(buffer);

            view.setUint8(0, 0x42);
            view.setUint8(1, 0x4D);
            view.setUint32(2, fileSize, true);
            view.setUint16(6, 0, true);
            view.setUint16(8, 0, true);
            view.setUint32(10, pixelDataOffset, true);

            view.setUint32(14, 40, true);
            view.setInt32(18, width, true);
            view.setInt32(22, height, true);
            view.setUint16(26, 1, true);
            view.setUint16(28, 24, true);
            view.setUint32(30, 0, true);
            view.setUint32(34, pixelArraySize, true);
            view.setInt32(38, 2835, true);
            view.setInt32(42, 2835, true);
            view.setUint32(46, 0, true);
            view.setUint32(50, 0, true);

            let offset = pixelDataOffset;
            for (let y = height - 1; y >= 0; y--) {
                const rowStart = y * width * 4;
                for (let x = 0; x < width; x++) {
                    const pixelOffset = rowStart + x * 4;
                    bytes[offset++] = pixels[pixelOffset + 2];
                    bytes[offset++] = pixels[pixelOffset + 1];
                    bytes[offset++] = pixels[pixelOffset];
                }
                for (let p = 0; p < paddingSize; p++) {
                    bytes[offset++] = 0;
                }
            }

            return buffer;
        }

        function indexedToBMP(width, height, indices, palette) {
            const paletteSize = Math.max(1, Math.min(256, palette.length));
            const rowSize = width;
            const paddedRowSize = (rowSize + 3) & ~3;
            const paddingSize = paddedRowSize - rowSize;
            const pixelArraySize = paddedRowSize * height;
            const paletteBytes = paletteSize * 4;
            const pixelDataOffset = 14 + 40 + paletteBytes;
            const fileSize = pixelDataOffset + pixelArraySize;
            const buffer = new ArrayBuffer(fileSize);
            const view = new DataView(buffer);
            const bytes = new Uint8Array(buffer);

            // BITMAPFILEHEADER (14 bytes)
            view.setUint8(0, 0x42);
            view.setUint8(1, 0x4D);
            view.setUint32(2, fileSize, true);
            view.setUint16(6, 0, true);
            view.setUint16(8, 0, true);
            view.setUint32(10, pixelDataOffset, true);

            // BITMAPINFOHEADER (40 bytes)
            view.setUint32(14, 40, true);
            view.setInt32(18, width, true);
            view.setInt32(22, height, true);
            view.setUint16(26, 1, true);
            view.setUint16(28, 8, true);
            view.setUint32(30, 0, true);
            view.setUint32(34, pixelArraySize, true);
            view.setInt32(38, 2835, true);
            view.setInt32(42, 2835, true);
            view.setUint32(46, paletteSize, true);
            view.setUint32(50, paletteSize, true);

            let paletteOffset = 54;
            for (let i = 0; i < paletteSize; i++) {
                const color = palette[i] || [0, 0, 0];
                bytes[paletteOffset++] = color[2];
                bytes[paletteOffset++] = color[1];
                bytes[paletteOffset++] = color[0];
                bytes[paletteOffset++] = 0;
            }

            let offset = pixelDataOffset;
            for (let y = height - 1; y >= 0; y--) {
                const rowStart = y * width;

                for (let x = 0; x < width; x++) {
                    bytes[offset++] = indices[rowStart + x];
                }

                for (let p = 0; p < paddingSize; p++) {
                    bytes[offset++] = 0;
                }
            }

            return buffer;
        }

        function getSelectedPalette(paletteName) {
            return PALETTE_PRESETS[paletteName] || PALETTE_PRESETS['4-color.act'];
        }

        function findNearestPaletteColor(red, green, blue, palette) {
            let bestIndex = 0;
            let bestDistance = Number.POSITIVE_INFINITY;

            for (let index = 0; index < palette.length; index++) {
                const color = palette[index];
                const dr = red - color[0];
                const dg = green - color[1];
                const db = blue - color[2];
                const distance = dr * dr + dg * dg + db * db;

                if (distance < bestDistance) {
                    bestDistance = distance;
                    bestIndex = index;
                }
            }

            return {
                index: bestIndex,
                color: palette[bestIndex]
            };
        }

        function addError(buffer, width, height, x, y, errorRed, errorGreen, errorBlue, factor) {
            if (x < 0 || x >= width || y < 0 || y >= height) {
                return;
            }

            const offset = (y * width + x) * 4;
            buffer[offset] += errorRed * factor;
            buffer[offset + 1] += errorGreen * factor;
            buffer[offset + 2] += errorBlue * factor;
        }

        function clampChannel(value) {
            return Math.max(0, Math.min(255, value));
        }

        function quantizeCanvasToIndexed(canvas, paletteName) {
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const imageData = ctx.getImageData(0, 0, width, height);
            const pixels = imageData.data;
            const working = new Float32Array(pixels.length);
            const palette = getSelectedPalette(paletteName);
            const indices = new Uint8Array(width * height);

            for (let i = 0; i < pixels.length; i++) {
                working[i] = pixels[i];
            }

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const offset = (y * width + x) * 4;
                    let red = clampChannel(working[offset]);
                    let green = clampChannel(working[offset + 1]);
                    let blue = clampChannel(working[offset + 2]);

                    const nearest = findNearestPaletteColor(red, green, blue, palette);
                    const nearestColor = nearest.color;

                    pixels[offset] = nearestColor[0];
                    pixels[offset + 1] = nearestColor[1];
                    pixels[offset + 2] = nearestColor[2];
                    pixels[offset + 3] = 255;
                    indices[y * width + x] = nearest.index;

                    const errorRed = red - nearestColor[0];
                    const errorGreen = green - nearestColor[1];
                    const errorBlue = blue - nearestColor[2];
                    addError(working, width, height, x + 1, y, errorRed, errorGreen, errorBlue, 7 / 16);
                    addError(working, width, height, x - 1, y + 1, errorRed, errorGreen, errorBlue, 3 / 16);
                    addError(working, width, height, x, y + 1, errorRed, errorGreen, errorBlue, 5 / 16);
                    addError(working, width, height, x + 1, y + 1, errorRed, errorGreen, errorBlue, 1 / 16);
                }
            }

            ctx.putImageData(imageData, 0, 0);
            return {
                width,
                height,
                palette,
                indices,
                imageData
            };
        }

        function renderPreview() {
            updateDitherUIState();

            if (!cropper || !targetWidth || !targetHeight || !ditherEnabledInput.checked) {
                return;
            }

            const canvas = getProcessedCanvas();
            if (!canvas) {
                return;
            }

            const processed = quantizeCanvasToIndexed(canvas, paletteSelect.value);
            previewCanvas.width = processed.width;
            previewCanvas.height = processed.height;
            previewCanvas.style.width = `${processed.width}px`;
            previewCanvas.style.height = `${processed.height}px`;
            previewCanvas.getContext('2d').putImageData(processed.imageData, 0, 0);
        }

        function schedulePreviewRender() {
            clearTimeout(previewRenderTimer);
            previewRenderTimer = setTimeout(renderPreview, 90);
        }

        pickFileBtn.addEventListener('click', () => fileInput.click());
        replaceBtn.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('click', (event) => {
            if (event.target !== pickFileBtn) {
                fileInput.click();
            }
        });

        dropZone.addEventListener('dragover', (event) => {
            event.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (event) => {
            event.preventDefault();
            dropZone.classList.remove('drag-over');
            loadImage(event.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (event) => {
            loadImage(event.target.files[0]);
        });

        document.addEventListener('paste', (event) => {
            const imageFile = getClipboardImageFile(event);
            if (!imageFile) {
                return;
            }

            const activeElement = document.activeElement;
            const isTypingTarget = activeElement &&
                (activeElement.tagName === 'INPUT' ||
                    activeElement.tagName === 'TEXTAREA' ||
                    activeElement.isContentEditable);

            if (isTypingTarget) {
                activeElement.blur();
            }

            event.preventDefault();
            loadImage(imageFile);
        });

        presetSizeSelect.addEventListener('change', () => {
            const value = presetSizeSelect.value;
            updateCustomSizeVisibility();

            if (value === 'custom') {
                return;
            }

            const [width, height] = value.split('x').map((item) => Number.parseInt(item, 10));
            setInputsFromDimensions(width, height);
            tryAutoApplyResolution();
        });

        swapDimensionsBtn.addEventListener('click', () => {
            const width = widthInput.value;
            const height = heightInput.value;
            widthInput.value = height;
            heightInput.value = width;
            syncPresetSelection();
            tryAutoApplyResolution();
        });

        widthInput.addEventListener('input', () => {
            syncPresetSelection();
            tryAutoApplyResolution();
        });
        heightInput.addEventListener('input', () => {
            syncPresetSelection();
            tryAutoApplyResolution();
        });
        backgroundColorInput.addEventListener('input', () => {
            setBackgroundColor(backgroundColorInput.value);
        });
        backgroundHexInput.addEventListener('input', () => {
            const normalized = normalizeHexColor(backgroundHexInput.value);
            if (normalized) {
                backgroundColorInput.value = normalized;
                backgroundHexInput.value = normalized;
                schedulePreviewRender();
            }
        });
        backgroundHexInput.addEventListener('blur', () => {
            backgroundHexInput.value = backgroundColorInput.value.toUpperCase();
        });
        pickColorBtn.addEventListener('click', pickBackgroundColor);
        ditherEnabledInput.addEventListener('change', () => {
            updateDitherUIState();
            schedulePreviewRender();
        });
        paletteSelect.addEventListener('change', schedulePreviewRender);
        exposureInput.addEventListener('input', () => {
            adjustmentState.exposure = Number.parseInt(exposureInput.value, 10) || 0;
            updateAdjustmentValueLabels();
            updateAdjustmentPreview();
            schedulePreviewRender();
        });
        contrastInput.addEventListener('input', () => {
            adjustmentState.contrast = Number.parseInt(contrastInput.value, 10) || 0;
            updateAdjustmentValueLabels();
            updateAdjustmentPreview();
            schedulePreviewRender();
        });
        hueInput.addEventListener('input', () => {
            adjustmentState.hue = Number.parseInt(hueInput.value, 10) || 0;
            updateAdjustmentValueLabels();
            updateAdjustmentPreview();
            schedulePreviewRender();
        });
        saturationInput.addEventListener('input', () => {
            adjustmentState.saturation = Number.parseInt(saturationInput.value, 10) || 0;
            updateAdjustmentValueLabels();
            updateAdjustmentPreview();
            schedulePreviewRender();
        });        resetAdjustmentsBtn.addEventListener('click', resetAdjustments);

        exportBtn.addEventListener('click', exportBMP);
        resetBtn.addEventListener('click', resetEditor);
        newImageBtn.addEventListener('click', clearAll);

        rotateLeftBtn.addEventListener('click', () => {
            if (!cropper) return;
            currentRotation -= 90;
            cropper.rotate(-90);
            applyFixedCropBox();
            updateInfo();
            schedulePreviewRender();
        });

        rotateRightBtn.addEventListener('click', () => {
            if (!cropper) return;
            currentRotation += 90;
            cropper.rotate(90);
            applyFixedCropBox();
            updateInfo();
            schedulePreviewRender();
        });

        flipHBtn.addEventListener('click', () => {
            if (!cropper) return;
            scaleX *= -1;
            cropper.scaleX(scaleX);
            applyFixedCropBox();
            schedulePreviewRender();
        });

        flipVBtn.addEventListener('click', () => {
            if (!cropper) return;
            scaleY *= -1;
            cropper.scaleY(scaleY);
            applyFixedCropBox();
            schedulePreviewRender();
        });

        zoomInBtn.addEventListener('click', () => {
            if (!cropper) return;
            cropper.zoom(0.1);
            applyFixedCropBox();
            schedulePreviewRender();
        });

        zoomOutBtn.addEventListener('click', () => {
            if (!cropper) return;
            cropper.zoom(-0.1);
            applyFixedCropBox();
            schedulePreviewRender();
        });

        document.addEventListener('keydown', (event) => {
            if (!cropper) {
                return;
            }

            const key = event.key.toLowerCase();

            if ((event.ctrlKey || event.metaKey) && key === 'r') {
                event.preventDefault();
                resetEditor();
                return;
            }

            if (key === '+' || key === '=') {
                event.preventDefault();
                cropper.zoom(0.1);
                applyFixedCropBox();
                schedulePreviewRender();
                return;
            }

            if (key === '-') {
                event.preventDefault();
                cropper.zoom(-0.1);
                applyFixedCropBox();
                schedulePreviewRender();
                return;
            }

            if (key === 'arrowleft') {
                event.preventDefault();
                cropper.move(-2, 0);
            } else if (key === 'arrowright') {
                event.preventDefault();
                cropper.move(2, 0);
            } else if (key === 'arrowup') {
                event.preventDefault();
                cropper.move(0, -2);
            } else if (key === 'arrowdown') {
                event.preventDefault();
                cropper.move(0, 2);
            } else {
                return;
            }

            applyFixedCropBox();
            schedulePreviewRender();
        });

        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (cropper) {
                    applyFixedCropBox();
                    schedulePreviewRender();
                    setFloatingPreviewPosition(previewPosition.left, previewPosition.top);
                } else {
                    updateOverlayMask(0, 0);
                }
            }, 120);
        });

        floatingPreview.addEventListener('pointerdown', (event) => {
            if (!ditherEnabledInput.checked || !cropper) {
                return;
            }

            event.preventDefault();
            const rect = floatingPreview.getBoundingClientRect();
            previewDragState = {
                offsetX: event.clientX - rect.left,
                offsetY: event.clientY - rect.top
            };
            floatingPreview.classList.add('dragging');
            document.body.style.cursor = 'move';
            document.body.style.userSelect = 'none';
        });

        floatingPreview.addEventListener('dragstart', (event) => {
            event.preventDefault();
        });

        window.addEventListener('pointermove', (event) => {
            if (!previewDragState) {
                return;
            }

            event.preventDefault();
            const left = event.clientX - previewDragState.offsetX;
            const top = event.clientY - previewDragState.offsetY;
            setFloatingPreviewPosition(left, top);
        });

        function stopPreviewDrag(pointerId) {
            if (previewDragState) {
                previewDragState = null;
            }
            floatingPreview.classList.remove('dragging');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
        }

        window.addEventListener('pointerup', (event) => {
            stopPreviewDrag(event.pointerId);
        });

        window.addEventListener('pointercancel', (event) => {
            stopPreviewDrag(event.pointerId);
        });
        updateInfo();
        updateCustomSizeVisibility();
        updateDitherUIState();
        syncAdjustmentInputs();
        setInputsFromDimensions(200, 200);
        targetWidth = 200;
        targetHeight = 200;
        updateOverlayMask(0, 0);
    </script>
</body>

</html>
